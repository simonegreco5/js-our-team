<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- sezione bootstrap -->
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body class="bg-success-subtle">
    
    <div class="container bg-white">

        <!-- TITOLO + LOREM -->
        <section class="p-4 text-center">
            <h1 class="mb-5 text-primary">
                <strong>Meet our Team</strong>
            </h1>

            <div class="w-100">
                Lorem ipsum dolor sit amet consectetur, 
                adipisicing elit. Facere illo reiciendis a magnam ut, 
                amet consectetur vitae sapiente consequatur nulla aut
                vel deleniti veritatis.
            </div>
        </section>

        <!-- CARD TEAM -->
        <section>
            <div class="row g-3" id="cards">
                <!-- add card with JavaScript -->
            </div>
        </section>

        <!-- FORM -->
        <div class="container">

            <form class="row g-3 mt-5 bg-dark p-2" id="form">
            <div class="col-md-6">
                <label for="name" class="form-label text-white">Name</label>
                <input type="text" class="form-control" id="name" placeholder="your name">
            </div>
            <div class="col-md-6">
                <label for="role" class="form-label text-white">Role</label>
                <input type="text" class="form-control" id="role" placeholder="your role">
            </div>
            <div class="col-md-6">
                <label for="email" class="form-label text-white">Email</label>
                <input type="email" class="form-control" id="email" placeholder="example@email.com">
            </div>
            <div class="col-md-6">
                <label for="image" class="form-label text-white">Image</label>
                <input type="text" class="form-control" id="image" placeholder="get your image">
            </div>
     
            <div class="col-12">
                <button type="submit" class="btn btn-primary">add</button>
            </div>
            </form>

        </div>
        
    </div>
    <!-- Sezione JavaScript -->
    <script src="./assets 2/script.js"></script>
</body>
</html>
